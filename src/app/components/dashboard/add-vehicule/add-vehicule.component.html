<div class="col-12 mx-auto">
    <div class="col-md-6 mb-2">
        <div class="justify-content-lg-start">
            <a routerLink="/vehicules" class="btn btn-sm btn-secondary add-infos text-white menu-font">
                <i class="fas fa-backward"></i> Retour
            </a>
        </div>
    </div>
    <form method="post" id="add-demande" (keyup.enter)="onSubmit()" [formGroup]="form" (submit)="onSubmit()">
        <div class="card mx-auto rounded-lg bg-white mb-3">
            <div class="card-header text-center bg-primary">
                <div class="mx-auto">{{modalTitle}}</div>
            </div>

            <div class="card-body">

                <div class="row">
                    <div class="col-6 form-group">
                        <div class="text-left"><label for="immatr">Immatriculation</label> <span style="color:red"> *</span>
                        </div>
                        <div [class.has-success]="!form.get('immatr')?.errors && formSubmitted" [class.has-danger]="form.get('immatr')?.errors && formSubmitted">
                            <input class="form-control form-control-sm" id="immatr" name="immatr" type="text" formControlName="immatr" (keyup)="trimImmatr();" [class.is-valid]="!form.get('immatr')?.errors && formSubmitted" [class.is-invalid]="form.get('immatr')?.errors && formSubmitted">
                        </div>
                    </div>
                    <div class="col-6 form-group">
                        <div class="text-left"><label for="date_mise_circulation">Date acquisition</label> <span style="color:red">
 *</span>
 </div>
 <div [class.has-success]="!form.get('date_mise_circulation')?.errors && formSubmitted"
 [class.has-danger]="form.get('date_mise_circulation')?.errors && formSubmitted">
 <input class="form-control form-control-sm" id="date_mise_circulation" name="date_mise_circulation"
 type="date" formControlName="date_mise_circulation"
 [class.is-valid]="!form.get('date_mise_circulation')?.errors && formSubmitted"
 [class.is-invalid]="form.get('date_mise_circulation')?.errors && formSubmitted">
 </div>
 </div>
 </div>
 <div class="row">
 <div class="col-6 form-group">
 <div class="text-left"><label for="marque">Marque</label> <span style="color:red"> *</span>
 </div>
 <div [class.has-success]="!form.get('marque')?.errors && formSubmitted"
 [class.has-danger]="form.get('marque')?.errors && formSubmitted">
 <input class="form-control form-control-sm" id="marque" name="marque" type="text" formControlName="marque"
 [class.is-valid]="!form.get('marque')?.errors && formSubmitted"
 [class.is-invalid]="form.get('marque')?.errors && formSubmitted">
 </div>
 </div>
 <div class="col-6 form-group">
 <div class="text-left"><label for="disponibilite">Disponibilite</label> <span style="color:red"> *</span>
 </div>
 <div>
 <ng-select
  bindLabel="text"
  bindValue="id"
  [items]="dataDisponibiliteSelect2"
  formControlName="disponibilite">
</ng-select>
 </div>
 </div>
 </div>

 <div class="row">
 <div class="col-6 form-group">
 <div class="text-left"><label for="capacite">Capacite</label> <span style="color:red"> *</span>
 </div>
 <div [class.has-success]="!form.get('capacite')?.errors && formSubmitted"
 [class.has-danger]="form.get('capacite')?.errors && formSubmitted">
 <input class="form-control form-control-sm" type="number" id="capacite" name="capacite"
 formControlName="capacite" [class.is-valid]="!form.get('capacite')?.errors && formSubmitted"
 [class.is-invalid]="form.get('capacite')?.errors && formSubmitted">
 </div>
 </div>
 <div class="col-6 form-group">
 <div class="text-left"><label for="type_vehicule">Type de véhicule <span style="color:red"> *</span>
 <span class="cursor-pointer ml-5" title="Ajouter un nouveau type" (click)="open_lg(typevehiculemodal);">
 <i class="fa fa-plus text-info"></i></span></label>
                        </div>
                        <div>

 <ng-select
  [items]="dataTypeVehiculeSelect2"
  bindLabel="text"
  bindValue="id"
  formControlName="type_vehicule_id"
  [clearable]="true"
  [searchable]="true"
  placeholder="Veuillez sélectionner un type de véhicule">
</ng-select>

                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer">
                <div class="mx-auto">
                    <button class="btn btn-secondary ml-3" (click)="reset()" type="reset">Annuler</button>
                    <button class="btn btn-primary ml-3" type="submit">Valider</button>
                </div>
            </div>
        </div>
    </form>
</div>


<!--Modal Type Véhicule-->
<ng-template #typevehiculemodal let-modal>
  <div class="modal-header">
    <h4>TEST MODAL</h4>
  </div>

  <div class="modal-body">
    <p>Le modal fonctionne ✅</p>
  </div>

  <div class="modal-footer">
    <button class="btn btn-danger" (click)="modal.close()">Fermer</button>
  </div>
</ng-template>
