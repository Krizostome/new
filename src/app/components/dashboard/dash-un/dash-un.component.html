<div class="p-0 rounded">
    <div [ngStyle]="{'background': 'linear-gradient(' + bg + ', orange)', 'color': color}" class="p-2 flex rounded">
        <div class="w-3/4 p-2">
            <h2 class="text-4xl">{{ value }}</h2>
            <h3 style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" class="text-sm font-bold"> {{ title }} </h3>
        </div>

        <div class="bord-rad-left text-center parent_center rounded-l p-2 w-1/4">
            <i [ngStyle]="{'color': bg}" class="fa {{ icon }} border icon_padding bg-gray-100 rounded-full text-lg"> </i>
        </div>

    </div>
</div>
