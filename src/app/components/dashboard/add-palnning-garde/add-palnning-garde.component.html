<div class="col-10 mx-auto">
  <div class="col-md-6 mb-2">
    <div class="justify-content-lg-start">
      <a routerLink="/planning-gardes" class="btn btn-sm btn-secondary add-infos text-white menu-font">
        <i class="fas fa-backward"></i> Retour
      </a>
    </div>
  </div>
  <form method="post" id="add-planing" (keyup.enter)="onSubmit()" [formGroup]="form" >
    <div class="card mx-auto rounded-lg bg-white mb-3">
      <div class="card-header text-center bg-primary">
        <div class="mx-auto">{{modalTitle}}</div>
      </div>

      <div class="card-body">

        <div class="row">
          <div class="col-3 form-group">
            <div class="text-left"><label for="date_debut">Date début garde</label> <span style="color:red">
                *</span>
            </div>
            <div [class.has-success]="!form.get('date_debut')?.errors && formSubmitted"
              [class.has-danger]="form.get('date_debut')?.errors && formSubmitted">
              <input class="form-control form-control-sm" id="date_debut" name="date_debut" type="date_debut"
                formControlName="date_debut" type="date"
                [class.is-valid]="!form.get('date_debut')?.errors && formSubmitted"
                [class.is-invalid]="form.get('date_debut')?.errors && formSubmitted">
            </div>
          </div>
          <div class="col-3 form-group">
            <div class="text-left"><label for="heure_debut">Heure début</label> <span style="color:red">
                *</span>
            </div>
            <div [class.has-success]="!form.get('heure_debut')?.errors && formSubmitted"
              [class.has-danger]="form.get('heure_debut')?.errors && formSubmitted">
              <input class="form-control form-control-sm" id="heure_debut" name="heure_debut" type="heure_debut"
                formControlName="heure_debut" type="time"
                [class.is-valid]="!form.get('heure_debut')?.errors && formSubmitted"
                [class.is-invalid]="form.get('heure_debut')?.errors && formSubmitted">
            </div>
          </div>
          <div class="col-3 form-group">
            <div class="text-left"><label for="date_fin">Date fin garde</label> <span style="color:red"> *</span>
            </div>
            <div [class.has-success]="!form.get('date_fin')?.errors && formSubmitted"
              [class.has-danger]="form.get('date_fin')?.errors && formSubmitted">
              <input class="form-control form-control-sm" id="date_fin" name="date_fin" type="text"
                formControlName="date_fin" [class.is-valid]="!form.get('date_fin')?.errors && formSubmitted"
                [class.is-invalid]="form.get('date_fin')?.errors && formSubmitted" type="date">
            </div>
          </div>
          <div class="col-3 form-group">
            <div class="text-left"><label for="heure_fin">Heure fin</label> <span style="color:red">
                *</span>
            </div>
            <div [class.has-success]="!form.get('heure_fin')?.errors && formSubmitted"
              [class.has-danger]="form.get('heure_fin')?.errors && formSubmitted">
              <input class="form-control form-control-sm" id="heure_fin" name="heure_fin" type="heure_fin"
                formControlName="heure_fin" type="time"
                [class.is-valid]="!form.get('heure_fin')?.errors && formSubmitted"
                [class.is-invalid]="form.get('heure_fin')?.errors && formSubmitted">
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-9 form-group">
            <div class="text-left"><label for="chauffeur_id">Chauffeur <span style="color:red"> *</span></label>
            </div>
            <div>
              <ng-select2 id="chauffeur_id" (valueChanged)="handleSelectChauffeurChange($event)"
                [data]="dataChauffeurSelect2" [options]="optionSelect2"
                [value]="elementChauffeurSelected !== undefined ? elementChauffeurSelected.id : ''"
                [class.has-success]="!form.get('chauffeur_id')?.errors && formSubmitted"
                [class.has-danger]="form.get('chauffeur_id')?.errors && formSubmitted"
                [placeholder]="'Veuillez sélectionner un chauffeur'">
              </ng-select2>
            </div>
          </div>
          <div class="col-3 form-group mt-3 text-right">
            <button type="button" class="btn btn-primary mt-2" [disabled]="!chauffeurId" (click)="addChauffeurToPanningGarde()"
              title="Ajouter le chauffeur sélectionné au planning"> 
              <i class="fa fa-plus" *ngIf="!spinning"></i> 
              <span *ngIf="spinning" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>              
              Ajouter le chauffeur 
            
            </button>
          </div>
        </div>

        <div class="row mt-3">
          <div class="col-12 form-group">
            <table id="bootstrap-data-table" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger"
              class="table table-responsive-sm table-responsive-md table-responsive-lg table-responsive-xl table-striped table-bordered w-100">
              <thead class=" bg-primary text-white">
                <tr>

                  <th class="text-center">N°</th>
                  <th class="text-center">Nom et Prénoms</th>
                  <th class="text-center">Catégorie Permis</th>
                  <th class="text-center">Téléphone</th>
                  <th class="text-center">Actions</th>

                </tr>
              </thead>
              <tbody>

                <tr *ngFor="let chauffeur of listeChauffeurs; let index= index">

                  <td class="text-center">{{index+1}}</td>
                  <td class="text-center">{{chauffeur.user?.nom}} {{chauffeur.user?.prenom}}</td>
                  <td class="text-center">Permis {{chauffeur.permis?.libelle}}</td>
                  <td class="text-center">{{chauffeur.contact}}</td>
                  <td class="text-center">

                    <a class="cursor-pointer ml-2">
                      <i class="fas fa-trash text-danger" data-placement="top" placement="top"
                        ngbTooltip="Retirer le chauffeur" (click)="removeChauffeurRow(index)"></i>
                    </a>

                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <div class="mx-auto">
          <button class="btn btn-secondary ml-3" (click)="reset()" type="reset">Annuler</button>
          <button class="btn btn-success ml-3" type="button" (click)="onSubmit()">Valider</button>
        </div>
      </div>
    </div>
  </form>
</div>
